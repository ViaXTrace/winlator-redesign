name: 🚀 Build & Release Winlator APK

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. 1.0.0)'
        required: true
        default: '1.0.0'
      version_code:
        description: 'Version code (integer)'
        required: true
        default: '1'
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-release:
    name: 🏗️ Build APK & Create Release
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🔑 Generate Debug Keystore
        run: |
          keytool -genkey -v \
            -keystore app/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Winlator, OU=Dev, O=WinlatorProject, L=Unknown, S=Unknown, C=US"
          echo "Keystore generated successfully"

      - name: 📦 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 🔧 Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.7"

      - name: 🏗️ Build Release APK
        run: gradle assembleRelease --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2"

      - name: 📋 Locate APK
        id: find_apk
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          echo "apk_name=$(basename $APK)" >> $GITHUB_OUTPUT
          echo "✅ Found APK: $APK"
          ls -lh "$APK"

      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: winlator-redesign-release
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 30

      - name: 🏷️ Resolve Version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            V="${{ github.event.inputs.version_name }}"
            C="${{ github.event.inputs.version_code }}"
          else
            V="${{ github.ref_name }}"
            V="${V#v}"
            C="${{ github.run_number }}"
          fi
          echo "name=$V" >> $GITHUB_OUTPUT
          echo "code=$C" >> $GITHUB_OUTPUT
          echo "tag=v$V" >> $GITHUB_OUTPUT
          echo "Version: $V ($C)"

      - name: 🚀 Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: ${{ steps.find_apk.outputs.apk_path }}
          tag: ${{ steps.version.outputs.tag }}
          name: "🪟 Winlator Redesign v${{ steps.version.outputs.name }}"
          body: |
            ## ✨ Winlator Redesign v${{ steps.version.outputs.name }}

            Complete glassmorphism UI/UX redesign of the Winlator app.

            ### 🎨 Design Highlights
            - Deep space dark gradient background (navy → purple)
            - Glass morphism cards with frosted-glass translucency
            - Electric accent palette: Cyan `#00E5FF` · Purple `#7C4DFF` · Green `#00FF88`
            - 20+ custom SVG vector icons
            - Smooth entrance animations and transitions
            - Material Design 3 component system

            ### 📱 Screens
            - **Splash** — Animated logo with glow entrance
            - **Dashboard** — Stats overview with system info cards
            - **Containers** — Full CRUD for Wine environments
            - **Shortcuts** — Game/app grid launcher
            - **Settings** — Grouped preference panels

            ### ⚙️ Technical Stack
            - Kotlin + ViewBinding + MVVM
            - Navigation Component (single-activity)
            - Room Database with Flow
            - Material Design 3
            - minSdk 26 (Android 8.0+)

            ### 📦 Installation
            1. Download `${{ steps.find_apk.outputs.apk_name }}` below
            2. Enable **Unknown sources** in Android Settings → Security
            3. Install the APK

            ---
            > Built from commit `${{ github.sha }}`
          allowUpdates: true
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
